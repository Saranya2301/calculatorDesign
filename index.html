<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/styles.css">
    <title>Standard Calculator</title>
</head>

<body>

    <header>
        <h1>Standard Calculator</h1>
    </header>
    <main>
        <section>
            <section id="hello">
                <strong>Result: </strong><span class>0</span>
            </section>
            <section>
                <section id="mon">
                    <button value="%" id="apple">%</button>
                    <button value="C/E" id="grapes">C/E</button>
                    <button value="C" id="berry">C</button>
                    <button value="&larr;" id="cho">&larr;</button>
                </section>
                <section id="tue">
                    <button value="1/x" class="one"><span><span class>1</span><span>/</span><span>x</span></span></button>
                    <button value="x^2">x<span>2</span></button>
                    <button value="√">√</button>
                    <button value="/" class="divide">÷</button>
                </section>
                <section id="new">
                    <button value="7" id="ee">7</button>
                    <button value="8" id="for">8</button>
                    <button value="9" id="no">9</button>
                    <button value="*">×</button>
                </section>
                <section class="next">
                    <button value="4" id="aa">4</button>
                    <button value="5" id="bb">5</button>
                    <button value="6" id="cc">6</button>
                    <button value="-" id="dd">-</button>
                </section>
                <section class="sibling">
                    <button value="1" class="red">1</button>
                    <button value="2" class="green">2</button>
                    <button value="3" class="orange">3</button>
                    <button value="+" class="yellow">+</button>
                </section>
                <section class="final">
                    <button value="-/+">-/+</button>
                    <button value="0">0</button>
                    <button value=".">.</button>
                    <button value="=">=</button>
                </section>
            </section>
        </section>
    </main>


</body>

</html>
